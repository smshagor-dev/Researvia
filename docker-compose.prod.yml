version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: profcrm_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: profcrm_db
      MYSQL_USER: profcrm
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  redis:
    image: redis:7-alpine
    container_name: profcrm_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/${GITHUB_ORG}/profcrm-api:${IMAGE_TAG:-latest}
    container_name: profcrm_api
    restart: unless-stopped
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
      restart_policy:
        condition: on-failure
        max_attempts: 3
    env_file: .env.production
    environment:
      DATABASE_URL: mysql://profcrm:${MYSQL_PASSWORD}@mysql:3306/profcrm_db?connection_limit=20
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  worker:
    image: ghcr.io/${GITHUB_ORG}/profcrm-api:${IMAGE_TAG:-latest}
    container_name: profcrm_worker
    restart: unless-stopped
    command: ["node", "dist/workers/index.js"]
    env_file: .env.production
    environment:
      DATABASE_URL: mysql://profcrm:${MYSQL_PASSWORD}@mysql:3306/profcrm_db?connection_limit=10
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    image: ghcr.io/${GITHUB_ORG}/profcrm-frontend:${IMAGE_TAG:-latest}
    container_name: profcrm_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/v1
      NEXT_PUBLIC_WS_URL: https://${DOMAIN}
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: profcrm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/ssl/certs:ro
      - certbot_data:/var/www/certbot:ro
    depends_on:
      - api
      - frontend
    networks:
      - internal
      - external

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  certbot_data:
    driver: local
